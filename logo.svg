<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Navy background -->
  <rect width="100" height="100" rx="18" fill="#0D1B3E"/>
  <!-- Light green: left arm -->
  <rect x="8" y="42" width="50" height="16" rx="8" fill="#639922"/>
  <!-- Light green: bottom arm -->
  <rect x="42" y="42" width="16" height="50" rx="8" fill="#639922"/>
  <!-- Dark green: top arm -->
  <rect x="42" y="8" width="16" height="50" rx="8" fill="#1a5c2a"/>
  <!-- Dark green: right arm -->
  <rect x="42" y="42" width="50" height="16" rx="8" fill="#1a5c2a"/>
  <!-- Centre fill -->
  <rect x="42" y="42" width="16" height="16" fill="#1a5c2a"/>
  <!-- Purple monogram circle -->
  <circle cx="50" cy="50" r="15" fill="#6B5CE7"/>
  <text x="50" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="Georgia, serif" font-style="italic">DF</text>
</svg>
